<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Template</title>

<style>
  :root {
    --bg: #eaf6ff;
    --primary: #4da3ff;
    --primary-dark: #2d7dd2;
    --card: rgba(255,255,255,0.7);
    --text: #1a2a3a;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #092B9C, #2DA0ED);
    color: var(--text);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* HEADER / LOGO AREA */
  header {
    text-align: center;
    padding: 40px 20px 20px;
  }

  .logo {
    width: 375px;
    height: 375px;
    margin: 0 auto 15px;
    border-radius: 20px;
    background: #57a4f2;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--primary);
    font-size: 18px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
  }

  .subtitle {
    opacity: 0.7;
    font-size: 14px;
  }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

/* BUTTON ROW (single line) */
.button-row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding-bottom: 5px;
}

/* BUTTON STYLE */
.button-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(16px, 2vw, 28px);
  flex-wrap:wrap;
  width:100%;
  max-width:1100px;
  margin:40px auto 0;
}

.btn{
  width:clamp(160px, 22vw, 240px);
  aspect-ratio:1 / 1;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;

  padding:18px;
  border:none;
  border-radius:24px;
  background:#57a4f2;
  color:#fff;
  box-shadow:0 12px 30px rgba(60,120,190,.18);
  cursor:pointer;
  transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
  text-align:center;
}

.btn:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 36px rgba(60,120,190,.22);
}

.btn img{
  width:clamp(56px, 7vw, 88px);
  height:clamp(56px, 7vw, 88px);
  object-fit:contain;
}

.btn span{
  font-size:clamp(14px, 1.2vw, 18px);
  font-weight:700;
  line-height:1.2;
  max-width:90%;
}

/* OPTIONAL secondary style */
.btn.secondary {
  background: white;
  color: var(--primary);
  border: 2px solid var(--primary);
}

  /* FOOTER */
  footer {
    text-align: center;
    padding: 15px;
    font-size: 12px;
    opacity: 0.6;
  }



</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" style="width:80%;height:auto;">
  </div>
  <h1>Tool Box Checks</h1>
  <div class="subtitle">Prins Greenhouses</div>
</header>

<main>
<div class="button-row">

  <button class="btn" onclick="location.href='Tool Box Check List.html'">
    <img src="Tool Box Logo.png">
    <span>Tool Box Check List</span>
  </button>

   <button class="btn" onclick="location.href='Broken Tool Check List.html'">
    <img src="Broken Tool.png">
    <span>Broken Tools</span>
  </button>

  <button class="btn" onclick="location.href='history.html'">
    <img src="Log.png">
    <span>Past Checks</span>
  </button>

  <button class="btn" onclick="location.href='borrowed.html'">
    <img src="Borrow.png">
    <span>Borrowed Tools</span>
  </button>

</div>
</main>

<footer>
  © 2026 Prins Greenhouses Maintenance App. All Rights Reserved.
</footer>

</body>
</html>
